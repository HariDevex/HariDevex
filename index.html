<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Profile README Hero Banners Preview</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
      background-color: #0b0f19;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #38bdf8, #a855f7, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 15px;
      margin-top: -35px;
    }
    .preview-card {
      width: 100%;
      max-width: 1180px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .card-header {
      padding: 12px 20px;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .dark-header {
      background: #0d1117;
      color: #c9d1d9;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .light-header {
      background: #f6f8fa;
      color: #24292f;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .img-container {
      width: 100%;
      line-height: 0;
    }
    img, embed {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <h1>GitHub Profile README Hero Banner Showcase</h1>
  <p class="subtitle">Pure SVG SMIL & CSS Animations • Dark Mode & Light Mode</p>

  <div class="preview-card">
    <div class="card-header dark-header">
      <span>🌙 GitHub Dark Theme (`dark.svg`)</span>
      <span>1180 × 610</span>
    </div>
    <div class="img-container">
      <embed src="dark.svg" type="image/svg+xml" width="1180" height="610">
    </div>
  </div>

  <div class="preview-card" style="background: #ffffff;">
    <div class="card-header light-header">
      <span>☀️ GitHub Light Theme (`light.svg`)</span>
      <span>1180 × 610</span>
    </div>
    <div class="img-container">
      <embed src="light.svg" type="image/svg+xml" width="1180" height="610">
    </div>
  </div>
</body>
</html>
